<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Dat Pip Boi — frog on a unicycle">
  <defs>
    <filter id="dpb-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g stroke="#3DFB6E" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#dpb-glow)">
    <!-- unicycle wheel -->
    <circle cx="60" cy="96" r="18" fill="none"/>
    <circle cx="60" cy="96" r="2.4" fill="#3DFB6E" stroke="none"/>
    <g stroke-width="1.6" opacity="0.85">
      <line x1="60" y1="96" x2="60" y2="78"/><line x1="60" y1="96" x2="60" y2="114"/>
      <line x1="60" y1="96" x2="44.4" y2="96"/><line x1="60" y1="96" x2="75.6" y2="96"/>
      <line x1="60" y1="96" x2="49" y2="85"/><line x1="60" y1="96" x2="71" y2="107"/>
      <line x1="60" y1="96" x2="49" y2="107"/><line x1="60" y1="96" x2="71" y2="85"/>
    </g>
    <!-- pedals + crank -->
    <line x1="48" y1="92" x2="72" y2="100"/>
    <line x1="44" y1="90" x2="50" y2="90"/><line x1="70" y1="102" x2="76" y2="102"/>
    <!-- seat post + saddle -->
    <line x1="60" y1="78" x2="60" y2="62"/>
    <path d="M51 62 q9 -5 18 0" fill="none"/>
    <!-- frog body -->
    <path d="M46 60 q14 -16 28 0 q3 8 -4 11 q-10 4 -20 0 q-7 -3 -4 -11 z" fill="#0d1211"/>
    <!-- little arms gripping -->
    <path d="M48 60 q-6 4 -3 9"/><path d="M72 60 q6 4 3 9"/>
    <!-- head + two eye bumps (classic Dat Boi) -->
    <circle cx="53" cy="40" r="7" fill="#0d1211"/><circle cx="67" cy="40" r="7" fill="#0d1211"/>
    <circle cx="53" cy="40" r="2.3" fill="#3DFB6E" stroke="none"/><circle cx="67" cy="40" r="2.3" fill="#3DFB6E" stroke="none"/>
    <!-- mouth / grin -->
    <path d="M50 50 q10 7 20 0" fill="none" stroke-width="2.4"/>
  </g>
</svg>
